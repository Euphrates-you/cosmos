# Publishes this static site to GitHub Pages on every push to main.
# The site lives at: https://euphrates-you.github.io/cosmos/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # enablement: true turns Pages on for the repo automatically
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      # The whole repo is the site (index.html at the root)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
